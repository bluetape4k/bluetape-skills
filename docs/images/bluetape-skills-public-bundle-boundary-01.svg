<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <style>
    .title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive; fill: #1e293b; font-size: 34px; }
    .region-title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive; fill: #1e293b; font-size: 23px; }
    .subtitle, .label, .small { font-family: 'Comic Mono', 'SFMono-Regular', Consolas, monospace; fill: #475569; }
    .subtitle { font-size: 15px; }
    .label { font-size: 15px; }
    .small { font-size: 12px; }
    .connector { fill: none; stroke: #4f7dc9; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#64748b" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 1 L 13 7 L 0 13 Z" fill="#4f7dc9"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="24" y="24" width="1152" height="672" rx="28" fill="#ffffff" stroke="#dbe5f1" stroke-width="2"/>

  <text x="56" y="76" class="title">Share the contract, keep the runtime private</text>
  <text x="58" y="108" class="subtitle">A portable skill bundle includes everything needed to execute the guidance — and nothing personal.</text>

  <path class="connector" d="M 300 365 H 380" marker-end="url(#arrow-blue)"/>

  <g filter="url(#shadow)">
    <rect x="50" y="150" width="250" height="430" rx="28" fill="#f3effb" stroke="#8a6fd1" stroke-width="2.5"/>
    <rect x="380" y="130" width="440" height="500" rx="32" fill="#f4f9ff" stroke="#4f7dc9" stroke-width="3"/>
    <rect x="900" y="150" width="250" height="430" rx="28" fill="#fff7f5" stroke="#d25b63" stroke-width="2.5"/>
  </g>

  <text x="175" y="187" text-anchor="middle" class="region-title">Canonical Skills</text>
  <text x="175" y="213" text-anchor="middle" class="region-title">Source</text>
  <text x="175" y="239" text-anchor="middle" class="small">managed and reviewed</text>

  <g filter="url(#shadow)">
    <rect x="78" y="255" width="194" height="70" rx="14" fill="#e8e1f7" stroke="#8a6fd1" stroke-width="2"/>
    <rect x="78" y="345" width="194" height="70" rx="14" fill="#e8e1f7" stroke="#8a6fd1" stroke-width="2"/>
    <rect x="78" y="435" width="194" height="70" rx="14" fill="#e8e1f7" stroke="#8a6fd1" stroke-width="2"/>
  </g>
  <text x="175" y="284" text-anchor="middle" class="label">Managed source</text>
  <text x="175" y="307" text-anchor="middle" class="small">single authority</text>
  <text x="175" y="374" text-anchor="middle" class="label">14 canonical skills</text>
  <text x="175" y="397" text-anchor="middle" class="small">allowlisted inventory</text>
  <text x="175" y="464" text-anchor="middle" class="label">Source-first export</text>
  <text x="175" y="487" text-anchor="middle" class="small">validated before sharing</text>

  <text x="600" y="172" text-anchor="middle" class="region-title">Public Bundle</text>
  <text x="600" y="197" text-anchor="middle" class="small">complete execution contract</text>

  <g filter="url(#shadow)">
    <rect x="420" y="220" width="360" height="58" rx="14" fill="#e8f1ff" stroke="#4f7dc9" stroke-width="2"/>
    <rect x="420" y="294" width="360" height="58" rx="14" fill="#e8f1ff" stroke="#4f7dc9" stroke-width="2"/>
    <rect x="420" y="368" width="360" height="58" rx="14" fill="#e8f1ff" stroke="#4f7dc9" stroke-width="2"/>
    <rect x="420" y="442" width="360" height="58" rx="14" fill="#e8f1ff" stroke="#4f7dc9" stroke-width="2"/>
    <rect x="420" y="516" width="360" height="58" rx="14" fill="#e8f1ff" stroke="#4f7dc9" stroke-width="2"/>
  </g>
  <text x="600" y="256" text-anchor="middle" class="label">SKILL.md</text>
  <text x="600" y="330" text-anchor="middle" class="label">references/</text>
  <text x="600" y="404" text-anchor="middle" class="label">templates/</text>
  <text x="600" y="478" text-anchor="middle" class="label">scripts/</text>
  <text x="600" y="552" text-anchor="middle" class="label">manifest.json</text>

  <text x="1025" y="194" text-anchor="middle" class="region-title">Private Runtime</text>
  <text x="1025" y="221" text-anchor="middle" class="small">excluded from distribution</text>

  <g filter="url(#shadow)">
    <rect x="928" y="250" width="194" height="44" rx="12" fill="#ffe8e3" stroke="#d25b63" stroke-width="2"/>
    <rect x="928" y="305" width="194" height="44" rx="12" fill="#ffe8e3" stroke="#d25b63" stroke-width="2"/>
    <rect x="928" y="360" width="194" height="44" rx="12" fill="#ffe8e3" stroke="#d25b63" stroke-width="2"/>
    <rect x="928" y="415" width="194" height="44" rx="12" fill="#ffe8e3" stroke="#d25b63" stroke-width="2"/>
    <rect x="928" y="470" width="194" height="44" rx="12" fill="#ffe8e3" stroke="#d25b63" stroke-width="2"/>
    <rect x="928" y="525" width="194" height="44" rx="12" fill="#ffe8e3" stroke="#d25b63" stroke-width="2"/>
  </g>
  <text x="1025" y="278" text-anchor="middle" class="label">memory</text>
  <text x="1025" y="333" text-anchor="middle" class="label">rules &amp; hooks</text>
  <text x="1025" y="388" text-anchor="middle" class="label">config</text>
  <text x="1025" y="443" text-anchor="middle" class="label">plugin caches</text>
  <text x="1025" y="498" text-anchor="middle" class="label">secrets</text>
  <text x="1025" y="553" text-anchor="middle" class="label">retired aliases</text>

  <g transform="translate(450 650)">
    <line x1="0" y1="0" x2="42" y2="0" stroke="#4f7dc9" stroke-width="4" stroke-linecap="round"/>
    <text x="54" y="5" class="small">distributed</text>
    <rect x="166" y="-10" width="24" height="20" rx="5" fill="#ffe8e3" stroke="#d25b63" stroke-width="2"/>
    <text x="202" y="5" class="small">kept private</text>
  </g>
</svg>
