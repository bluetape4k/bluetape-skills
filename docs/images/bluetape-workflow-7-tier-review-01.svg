<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <style>
    .title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive; fill: #1e293b; font-size: 36px; }
    .subtitle, .label, .small, .gate { font-family: 'Comic Mono', 'SFMono-Regular', Consolas, monospace; }
    .subtitle { fill: #475569; font-size: 15px; }
    .label { fill: #27364a; font-size: 15px; }
    .small { fill: #526174; font-size: 12px; }
    .gate { fill: #1e293b; font-size: 18px; font-weight: 700; }
  </style>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#64748b" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 1 L 11 6 L 0 11 Z" fill="#4f7dc9"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 1 L 11 6 L 0 11 Z" fill="#d25b63"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 1 L 11 6 L 0 11 Z" fill="#45a66f"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <rect x="24" y="24" width="1552" height="852" rx="28" fill="#ffffff" stroke="#dbe5f1" stroke-width="2"/>
  <text x="58" y="78" class="title">One 7-Tier engine guards 2-R, 3-R, and 6-R</text>
  <text x="60" y="110" class="subtitle">Six independent lenses find different failures; the main session integrates and owns the gate.</text>

  <!-- top gates -->
  <g filter="url(#shadow)">
    <rect x="150" y="140" width="330" height="74" rx="15" fill="#eef6ff" stroke="#4f7dc9" stroke-width="2"/>
    <rect x="635" y="140" width="330" height="74" rx="15" fill="#eef6ff" stroke="#4f7dc9" stroke-width="2"/>
    <rect x="1120" y="140" width="330" height="74" rx="15" fill="#eef6ff" stroke="#4f7dc9" stroke-width="2"/>
  </g>
  <text x="315" y="174" text-anchor="middle" class="gate">2-R / Spec</text>
  <text x="315" y="197" text-anchor="middle" class="small">design and acceptance contract</text>
  <text x="800" y="174" text-anchor="middle" class="gate">3-R / Plan</text>
  <text x="800" y="197" text-anchor="middle" class="small">mapping, order, proof, hazards</text>
  <text x="1285" y="174" text-anchor="middle" class="gate">6-R / Pre-PR</text>
  <text x="1285" y="197" text-anchor="middle" class="small">current diff and fresh evidence</text>

  <!-- gates to launch -->
  <g fill="none" stroke="#4f7dc9" stroke-width="2.5" marker-end="url(#arrow-blue)">
    <path class="connector" d="M 315 214 V 236 Q 315 248 327 248 H 708 Q 720 248 720 260 V 270"/>
    <path class="connector" d="M 800 214 V 270"/>
    <path class="connector" d="M 1285 214 V 236 Q 1285 248 1273 248 H 892 Q 880 248 880 260 V 270"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="620" y="270" width="360" height="64" rx="16" fill="#faf5ff" stroke="#8a6fd1" stroke-width="2"/>
  </g>
  <text x="800" y="297" text-anchor="middle" class="gate">Launch six independent lenses</text>
  <text x="800" y="319" text-anchor="middle" class="small">parallel perspectives, separate findings</text>

  <!-- fan-out bus -->
  <g fill="none" stroke="#4f7dc9" stroke-width="2.2" marker-end="url(#arrow-blue)">
    <path class="connector" d="M 800 334 V 348 Q 800 360 788 360 H 272 Q 260 360 260 372 V 390"/>
    <path class="connector" d="M 800 334 V 348 Q 800 360 788 360 H 488 Q 476 360 476 372 V 390"/>
    <path class="connector" d="M 800 334 V 348 Q 800 360 788 360 H 704 Q 692 360 692 372 V 390"/>
    <path class="connector" d="M 800 334 V 348 Q 800 360 812 360 H 896 Q 908 360 908 372 V 390"/>
    <path class="connector" d="M 800 334 V 348 Q 800 360 812 360 H 1112 Q 1124 360 1124 372 V 390"/>
    <path class="connector" d="M 800 334 V 348 Q 800 360 812 360 H 1328 Q 1340 360 1340 372 V 390"/>
  </g>

  <!-- six lens cards -->
  <g filter="url(#shadow)">
    <rect x="160" y="390" width="200" height="84" rx="15" fill="#eef6ff" stroke="#7aa7e8"/>
    <rect x="376" y="390" width="200" height="84" rx="15" fill="#f0fdf4" stroke="#6db88a"/>
    <rect x="592" y="390" width="200" height="84" rx="15" fill="#fef2f2" stroke="#d25b63"/>
    <rect x="808" y="390" width="200" height="84" rx="15" fill="#fff7ed" stroke="#d89132"/>
    <rect x="1024" y="390" width="200" height="84" rx="15" fill="#f0fdfa" stroke="#2b9c93"/>
    <rect x="1240" y="390" width="200" height="84" rx="15" fill="#faf5ff" stroke="#8a6fd1"/>
  </g>
  <text x="260" y="426" text-anchor="middle" class="gate">Performance</text><text x="260" y="451" text-anchor="middle" class="small">cost, scale, latency</text>
  <text x="476" y="426" text-anchor="middle" class="gate">Stability</text><text x="476" y="451" text-anchor="middle" class="small">failure, concurrency</text>
  <text x="692" y="426" text-anchor="middle" class="gate">Security</text><text x="692" y="451" text-anchor="middle" class="small">trust and exposure</text>
  <text x="908" y="426" text-anchor="middle" class="gate">Operator / Ops</text><text x="908" y="451" text-anchor="middle" class="small">deploy and observe</text>
  <text x="1124" y="426" text-anchor="middle" class="gate">Developer / API</text><text x="1124" y="451" text-anchor="middle" class="small">contract and misuse</text>
  <text x="1340" y="426" text-anchor="middle" class="gate">User / Caller</text><text x="1340" y="451" text-anchor="middle" class="small">outcome and clarity</text>

  <!-- lenses to integration -->
  <g fill="none" stroke="#4f7dc9" stroke-width="2.2" marker-end="url(#arrow-blue)">
    <path class="connector" d="M 260 474 V 494 Q 260 506 272 506 H 788 Q 800 506 800 518 V 532"/>
    <path class="connector" d="M 476 474 V 494 Q 476 506 488 506 H 788 Q 800 506 800 518 V 532"/>
    <path class="connector" d="M 692 474 V 494 Q 692 506 704 506 H 788 Q 800 506 800 518 V 532"/>
    <path class="connector" d="M 908 474 V 494 Q 908 506 896 506 H 812 Q 800 506 800 518 V 532"/>
    <path class="connector" d="M 1124 474 V 494 Q 1124 506 1112 506 H 812 Q 800 506 800 518 V 532"/>
    <path class="connector" d="M 1340 474 V 494 Q 1340 506 1328 506 H 812 Q 800 506 800 518 V 532"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="585" y="532" width="430" height="82" rx="16" fill="#e8f1ff" stroke="#4f7dc9" stroke-width="2.5"/>
  </g>
  <text x="800" y="565" text-anchor="middle" class="gate">Main-session Integration</text>
  <text x="800" y="590" text-anchor="middle" class="small">deduplicate, resolve conflicts, normalize P0 / P1 / P2 / P3</text>

  <!-- decision and branches -->
  <path class="connector" d="M 800 614 V 644" fill="none" stroke="#4f7dc9" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <g filter="url(#shadow)">
    <rect x="625" y="644" width="350" height="70" rx="28" fill="#fffaf0" stroke="#d89132" stroke-width="2"/>
  </g>
  <text x="800" y="686" text-anchor="middle" class="gate">P0 = 0 and P1 = 0?</text>

  <!-- pass branch -->
  <path class="connector" d="M 975 679 H 1090" fill="none" stroke="#45a66f" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="1032" y="666" text-anchor="middle" class="small">YES</text>
  <g filter="url(#shadow)">
    <rect x="1090" y="644" width="330" height="70" rx="16" fill="#f0fdf4" stroke="#45a66f" stroke-width="2"/>
  </g>
  <text x="1255" y="673" text-anchor="middle" class="gate">Open the next gate</text>
  <text x="1255" y="696" text-anchor="middle" class="small">record fresh P0 = 0, P1 = 0</text>

  <!-- blocker branch and feedback -->
  <path class="connector" d="M 625 679 H 510" fill="none" stroke="#d25b63" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="567" y="666" text-anchor="middle" class="small">NO</text>
  <g filter="url(#shadow)">
    <rect x="180" y="644" width="330" height="70" rx="16" fill="#fef2f2" stroke="#d25b63" stroke-width="2"/>
    <rect x="180" y="760" width="330" height="70" rx="16" fill="#fef2f2" stroke="#d25b63" stroke-width="2"/>
    <rect x="635" y="760" width="330" height="70" rx="16" fill="#faf5ff" stroke="#8a6fd1" stroke-width="2"/>
  </g>
  <text x="345" y="673" text-anchor="middle" class="gate">Repair blocker</text>
  <text x="345" y="696" text-anchor="middle" class="small">P0 / P1 findings stop downstream work</text>
  <path class="connector" d="M 345 714 V 760" fill="none" stroke="#d25b63" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="345" y="789" text-anchor="middle" class="gate">Rerun validation</text>
  <text x="345" y="812" text-anchor="middle" class="small">prove the repaired behavior</text>
  <path class="connector" d="M 510 795 H 635" fill="none" stroke="#d25b63" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="800" y="789" text-anchor="middle" class="gate">Affected review lanes</text>
  <text x="800" y="812" text-anchor="middle" class="small">reopen every changed assumption</text>
  <path class="connector" d="M 965 795 H 1498 Q 1510 795 1510 783 V 598 Q 1510 586 1498 586 H 1015" fill="none" stroke="#d25b63" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="1490" y="690" text-anchor="middle" class="small" transform="rotate(-90 1490 690)">reintegrate after affected lanes</text>

  <!-- legend -->
  <circle cx="1120" cy="838" r="7" fill="#4f7dc9"/><text x="1136" y="843" class="small">review flow</text>
  <circle cx="1240" cy="838" r="7" fill="#d25b63"/><text x="1256" y="843" class="small">blocker loop</text>
  <circle cx="1372" cy="838" r="7" fill="#45a66f"/><text x="1388" y="843" class="small">gate pass</text>
  <text x="800" y="862" text-anchor="middle" class="small">Integration is the seventh tier, owned by the main session, not a seventh reviewer agent.</text>
</svg>
