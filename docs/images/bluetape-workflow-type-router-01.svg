<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <style>
    .title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive; fill: #1e293b; font-size: 34px; }
    .subtitle, .label, .small { font-family: 'Comic Mono', 'SFMono-Regular', Consolas, monospace; fill: #475569; }
    .subtitle { font-size: 15px; }
    .type { font-family: 'Architects Daughter', 'Comic Sans MS', cursive; fill: #1e293b; font-size: 22px; }
    .label { font-size: 14px; }
    .small { font-size: 12px; }
  </style>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#64748b" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 1 L 13 7 L 0 13 Z" fill="#4f7dc9"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="24" y="24" width="1152" height="672" rx="28" fill="#ffffff" stroke="#dbe5f1" stroke-width="2"/>

  <text x="56" y="76" class="title">Route the work before doing the work</text>
  <text x="58" y="108" class="subtitle">One request enters bluetape-workflow; scope, risk, and required evidence select the lightest safe lane.</text>

  <!-- Primary route connectors -->
  <path d="M 600 186 V 228" fill="none" stroke="#4f7dc9" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path class="connector" d="M 600 338 V 378 Q 600 390 588 390 H 130 Q 118 390 118 402 V 438" fill="none" stroke="#4f7dc9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
  <path class="connector" d="M 600 338 V 378 Q 600 390 588 390 H 291 Q 279 390 279 402 V 438" fill="none" stroke="#4f7dc9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
  <path class="connector" d="M 600 338 V 378 Q 600 390 588 390 H 452 Q 440 390 440 402 V 438" fill="none" stroke="#4f7dc9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
  <path class="connector" d="M 600 338 V 438" fill="none" stroke="#4f7dc9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
  <path class="connector" d="M 600 338 V 378 Q 600 390 612 390 H 750 Q 762 390 762 402 V 438" fill="none" stroke="#4f7dc9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
  <path class="connector" d="M 600 338 V 378 Q 600 390 612 390 H 911 Q 923 390 923 402 V 438" fill="none" stroke="#4f7dc9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
  <path class="connector" d="M 600 338 V 378 Q 600 390 612 390 H 1070 Q 1082 390 1082 402 V 438" fill="none" stroke="#4f7dc9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>

  <!-- Request and router -->
  <g filter="url(#shadow)">
    <rect x="430" y="126" width="340" height="60" rx="14" fill="#eef6ff" stroke="#7aa7e8" stroke-width="2"/>
    <rect x="430" y="228" width="340" height="110" rx="18" fill="#e8f1ff" stroke="#4f7dc9" stroke-width="2.5"/>
  </g>
  <text x="600" y="163" text-anchor="middle" class="type">User request</text>
  <text x="600" y="270" text-anchor="middle" class="type">bluetape-workflow</text>
  <text x="600" y="298" text-anchor="middle" class="label">classify scope, risk, and proof</text>
  <text x="600" y="320" text-anchor="middle" class="small">first plan approval before mutation</text>

  <!-- Type cards -->
  <g filter="url(#shadow)">
    <rect x="48" y="450" width="140" height="176" rx="16" fill="#eef6ff" stroke="#4f7dc9" stroke-width="2"/>
    <rect x="209" y="450" width="140" height="176" rx="16" fill="#f0fdf4" stroke="#45a66f" stroke-width="2"/>
    <rect x="370" y="450" width="140" height="176" rx="16" fill="#fff7ed" stroke="#d89132" stroke-width="2"/>
    <rect x="531" y="450" width="140" height="176" rx="16" fill="#f8fafc" stroke="#7b8798" stroke-width="2"/>
    <rect x="692" y="450" width="140" height="176" rx="16" fill="#f0fdfa" stroke="#2b9c93" stroke-width="2"/>
    <rect x="853" y="450" width="140" height="176" rx="16" fill="#fef2f2" stroke="#d25b63" stroke-width="2"/>
    <rect x="1014" y="450" width="136" height="176" rx="16" fill="#faf5ff" stroke="#8a6fd1" stroke-width="2"/>
  </g>

  <text x="118" y="487" text-anchor="middle" class="type">A</text>
  <text x="118" y="513" text-anchor="middle" class="label">Full Feature</text>
  <text x="118" y="541" text-anchor="middle" class="small">module / service</text>
  <text x="118" y="561" text-anchor="middle" class="small">broad API</text>
  <text x="118" y="597" text-anchor="middle" class="small">full-feature</text>

  <text x="279" y="487" text-anchor="middle" class="type">B</text>
  <text x="279" y="513" text-anchor="middle" class="label">Fast Track</text>
  <text x="279" y="541" text-anchor="middle" class="small">small additive</text>
  <text x="279" y="561" text-anchor="middle" class="small">local impact</text>
  <text x="279" y="597" text-anchor="middle" class="small">fast-track</text>

  <text x="440" y="487" text-anchor="middle" class="type">C</text>
  <text x="440" y="513" text-anchor="middle" class="label">Bug Fix</text>
  <text x="440" y="541" text-anchor="middle" class="small">reproducible</text>
  <text x="440" y="561" text-anchor="middle" class="small">defect / regression</text>
  <text x="440" y="597" text-anchor="middle" class="small">bugfix</text>

  <text x="601" y="487" text-anchor="middle" class="type">D</text>
  <text x="601" y="513" text-anchor="middle" class="label">Code Review</text>
  <text x="601" y="541" text-anchor="middle" class="small">read-only audit</text>
  <text x="601" y="561" text-anchor="middle" class="small">ranked findings</text>
  <text x="601" y="597" text-anchor="middle" class="small">code-review</text>

  <text x="762" y="487" text-anchor="middle" class="type">E</text>
  <text x="762" y="513" text-anchor="middle" class="label">Maintenance</text>
  <text x="762" y="541" text-anchor="middle" class="small">docs / guidance</text>
  <text x="762" y="561" text-anchor="middle" class="small">config / CI</text>
  <text x="762" y="597" text-anchor="middle" class="small">maintenance</text>

  <text x="923" y="487" text-anchor="middle" class="type">P</text>
  <text x="923" y="513" text-anchor="middle" class="label">Publish</text>
  <text x="923" y="541" text-anchor="middle" class="small">release / tag</text>
  <text x="923" y="561" text-anchor="middle" class="small">artifact proof</text>
  <text x="923" y="597" text-anchor="middle" class="small">publish-jvm/go</text>

  <text x="1082" y="487" text-anchor="middle" class="type">F</text>
  <text x="1082" y="513" text-anchor="middle" class="label">Self Improve</text>
  <text x="1082" y="541" text-anchor="middle" class="small">benchmark loop</text>
  <text x="1082" y="561" text-anchor="middle" class="small">measured stop</text>
  <text x="1082" y="597" text-anchor="middle" class="small">self-improve</text>

  <text x="600" y="666" text-anchor="middle" class="small">Classification chooses the lane; evidence closes it.</text>
</svg>
